<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مذكرة - منصة الباسط</title>
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/admin.css?v=4">
    <link rel="stylesheet" href="css/admin-forms.css?v=4">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=3"></script>
    <script src="js/supabase.js?v=3"></script>
    <header class="admin-header">
        <div class="container">
            <div class="admin-header-content">
                <div class="logo"><a href="admin.html" class="logo-text">الباسط</a><span class="admin-badge">إضافة مذكرة</span></div>
                <a href="admin.html" class="btn btn-outline btn-light">← رجوع</a>
            </div>
        </div>
    </header>
    <main class="form-page">
        <div class="container">
            <form id="noteForm" class="admin-form-card">
                <h1 class="form-page-title">إضافة مذكرة PDF</h1>
                <div class="form-row">
                    <div class="form-group"><label for="noteGrade">الصف</label><select id="noteGrade" required style="appearance:auto;-webkit-appearance:auto;pointer-events:auto;"></select></div>
                    <div class="form-group"><label for="noteMonth">الشهر</label><select id="noteMonth" required style="appearance:auto;-webkit-appearance:auto;pointer-events:auto;"></select></div>
                </div>
                <div class="form-group"><label for="noteTitle">العنوان</label><input type="text" id="noteTitle" required></div>
                <div class="form-group"><label for="noteDescription">الوصف</label><textarea id="noteDescription" rows="3"></textarea></div>
                <div class="form-group">
                    <label>ملف PDF</label>
                    <div class="drop-zone" id="pdfDropZone"><p>اسحب ملف PDF أو اضغط للاختيار</p></div>
                    <input type="file" id="pdfInput" accept=".pdf,application/pdf" style="display:none">
                </div>
                <div class="pricing-section">
                    <div class="pricing-header">
                        <label class="checkbox-label">
                            <input type="checkbox" id="noteFree" onchange="toggleNotePrice()">
                            <span>مجاني</span>
                        </label>
                        <span class="price-badge">مميز</span>
                    </div>
                    <div class="price-input-group" id="notePriceGroup">
                        <label for="notePrice">سعر الاشتراك (ج.م)</label>
                        <input type="number" id="notePrice" min="0" step="0.01" placeholder="مثال: 50">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">حفظ المذكرة</button>
                    <a href="admin.html" class="btn btn-outline">إلغاء</a>
                </div>
            </form>
        </div>
    </main>
    <script src="js/db.js?v=4"></script>
    <script src="js/cloudinary.js?v=4"></script>
    <script src="js/auth.js?v=4"></script>
    <script src="js/main.js?v=4"></script>
    <script>
        (async function() {
            var g = document.getElementById('noteGrade');
            try {
                var grades = await db.getGrades();
                g.innerHTML = grades.map(function(x) { return '<option value="' + x.id + '">' + x.name + '</option>'; }).join('');
                var id = parseInt(g.value);
                if (id) {
                    await db.ensureNineMonths(id);
                    var m = await db.getMonths(id);
                    document.getElementById('noteMonth').innerHTML = m.map(function(x) { return '<option value="' + x.id + '">' + x.name + '</option>'; }).join('');
                }
            } catch(e) { console.error('Grade load error:', e); }
            g.onchange = async function() {
                var id = parseInt(g.value);
                if (!id) return;
                await db.ensureNineMonths(id);
                var m = await db.getMonths(id);
                document.getElementById('noteMonth').innerHTML = m.map(function(x) { return '<option value="' + x.id + '">' + x.name + '</option>'; }).join('');
            };
        })();
        function setupDropZone(zoneId, inputId, onSelect) {
            var zone = document.getElementById(zoneId);
            var input = document.getElementById(inputId);
            zone.addEventListener('click', function() { input.click(); });
            zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                zone.classList.remove('dragover');
                var file = e.dataTransfer.files && e.dataTransfer.files[0];
                if (file) onSelect(file, zone);
            });
            input.addEventListener('change', function() {
                var file = input.files && input.files[0];
                if (file) onSelect(file, zone);
            });
        }
        function showFilePreview(zone, file, label) {
            var p = zone.querySelector('p');
            if (p) p.textContent = label || '\u2713 ' + file.name;
            zone.classList.add('has-file');
        }
        var pdfFile = null;
        function toggleNotePrice() {
            var isFree = document.getElementById('noteFree').checked;
            var group = document.getElementById('notePriceGroup');
            group.classList.toggle('hidden', isFree);
            if (isFree) document.getElementById('notePrice').value = '';
        }
        document.getElementById('noteFree').onchange = toggleNotePrice;
        document.addEventListener('DOMContentLoaded', async function() {
            toggleNotePrice();
            setupDropZone('pdfDropZone', 'pdfInput', function(f, z) { pdfFile = f; showFilePreview(z, f); });
            document.getElementById('noteForm').onsubmit = async function(e) {
                e.preventDefault();
                if (!pdfFile) { showAlert('يرجى اختيار ملف PDF', 'error'); return; }
                var isFree = document.getElementById('noteFree').checked;
                var priceInput = document.getElementById('notePrice').value;
                var price = isFree ? 0 : (priceInput ? parseFloat(priceInput) : null);
                if (!isFree && (price === null || isNaN(price))) { showAlert('يرجى إدخال سعر صحيح', 'error'); return; }
                try {
                    var url = (await uploadPDF(pdfFile, 'notes')).secure_url;
                    await db.createNote({
                        grade_id: parseInt(g.value),
                        month_id: parseInt(document.getElementById('noteMonth').value),
                        title: document.getElementById('noteTitle').value,
                        description: document.getElementById('noteDescription').value,
                        file_url: url,
                        is_free: isFree
                    });
                    showAlert('تم الحفظ', 'success');
                    setTimeout(function() { location.href = 'admin.html'; }, 1000);
                } catch (err) { console.error('Note save error:', err); showAlert('خطأ: ' + err.message, 'error'); }
            };
        });
    </script>
</body>
</html>
