<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO ===== -->
    <title>الامتحان | منصة الباسط للعلوم الشرعية</title>
    <meta name="description" content="الامتحانات التفاعلية وقياس مستوى تحصيل الطالب في العلوم الشرعية على منصة الباسط.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://albasit.vercel.app/exam.html">

    <!-- ===== Performance: Preconnect ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ===== Styles ===== -->
    <link rel="stylesheet" href="css/style.css?v=5">
    <link rel="stylesheet" href="css/exam.css?v=5">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap">

    <!-- ===== Exam Mobile Override (inline to bypass cache & specificity) ===== -->
    <style>
        @media (max-width: 768px) {
            .exam-section { padding: 20px 0 !important; }
            .exam-section .container { max-width: 100% !important; padding: 0 14px !important; }
        }
        @media (max-width: 480px) {
            .exam-section { padding: 10px 0 !important; }
            .exam-section .container { max-width: 100% !important; width: 100% !important; padding: 0 6px !important; }
            .exam-header { padding: 14px 10px !important; margin-bottom: 12px !important; border-radius: 12px !important; }
            .exam-info h1 { font-size: 17px !important; }
            .exam-meta { font-size: 13px !important; }
            .exam-timer { padding: 10px 14px !important; }
            .timer-display { font-size: 20px !important; }
            .question-card { padding: 12px 8px !important; margin-bottom: 10px !important; border-radius: 12px !important; }
            .question-text { font-size: 14px !important; margin-bottom: 12px !important; }
            .question-number { font-size: 11px !important; padding: 5px 12px !important; margin-bottom: 10px !important; }
            .option-label { padding: 10px 8px !important; font-size: 13px !important; gap: 8px !important; }
            .option-label input[type="radio"] { width: 18px !important; height: 18px !important; }
            .exam-actions .btn { width: 100% !important; padding: 12px 16px !important; font-size: 14px !important; }
            .page-back-bar { margin-bottom: 8px !important; }
            .page-back-bar .btn { font-size: 12px !important; padding: 7px 12px !important; }
            .essay-answer { min-height: 120px !important; padding: 10px !important; font-size: 13px !important; }
            .score-circle { width: 90px !important; height: 90px !important; font-size: 26px !important; }
            .result-item { padding: 10px !important; font-size: 13px !important; }
            .result-status { padding: 12px !important; font-size: 14px !important; }
            .modal-content .result-content { padding: 14px 10px !important; }
        }
        @media (max-width: 360px) {
            .exam-section .container { padding: 0 4px !important; }
            .exam-header { padding: 10px 6px !important; }
            .exam-info h1 { font-size: 15px !important; }
            .timer-display { font-size: 18px !important; }
            .question-card { padding: 8px 5px !important; }
            .question-text { font-size: 13px !important; }
            .option-label { padding: 8px 6px !important; font-size: 12px !important; }
            .score-circle { width: 70px !important; height: 70px !important; font-size: 20px !important; }
        }
    </style>
</head>
<body>
    <!-- Load Supabase library first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" class="logo-text">الباسط</a>
                </div>
                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                        <li><a href="about.html" class="nav-link">نبذة عنا</a></li>
                        <li><a href="dashboard.html" class="nav-link">لوحتي</a></li>
                    </ul>
                </nav>
                <div class="auth-buttons" id="authButtons"></div>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="القائمة">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
        <div class="nav-overlay" onclick="toggleMobileMenu()"></div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="exam-section">
            <div class="container">
                <div class="page-back-bar">
                    <button type="button" class="btn btn-outline" onclick="goBackToDashboard('exams')">← العودة للوحة التحكم</button>
                </div>
                <!-- Exam Header -->
                <div class="exam-header">
                    <div class="exam-info">
                        <h1 class="exam-title" id="examTitle">جاري التحميل...</h1>
                        <div class="exam-meta">
                            <span id="examDuration">-</span>
                            <span id="examQuestions">-</span>
                        </div>
                    </div>
                    <div class="exam-timer">
                        <div class="timer-display" id="timerDisplay">00:00</div>
                    </div>
                </div>

                <!-- Exam Questions -->
                <div class="exam-questions" id="examQuestions">
                    <div class="spinner"></div>
                </div>

                <!-- Exam Actions -->
                <div class="exam-actions">
                    <button class="btn btn-primary btn-large" onclick="submitExam()">تسليم الامتحان</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Result Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('resultModal')">&times;</span>
            <h2 class="modal-title">نتيجة الامتحان</h2>
            <div class="result-content">
                <div class="result-score">
                    <div class="score-circle">
                        <span id="scorePercentage">0%</span>
                    </div>
                </div>
                <div class="result-details">
                    <div class="result-item">
                        <span class="label">الدرجة:</span>
                        <span class="value" id="scoreValue">0 / 0</span>
                    </div>
                    <div class="result-item">
                        <span class="label">الإجابات الصحيحة:</span>
                        <span class="value" id="correctAnswers">0</span>
                    </div>
                    <div class="result-item">
                        <span class="label">الإجابات الخاطئة:</span>
                        <span class="value" id="wrongAnswers">0</span>
                    </div>
                    <div class="result-item">
                        <span class="label">الوقت:</span>
                        <span class="value" id="timeTaken">0 دقيقة</span>
                    </div>
                </div>
                <div class="result-status" id="resultStatus"></div>
                <button class="btn btn-primary btn-full" onclick="goToDashboard()">العودة للوحة التحكم</button>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3"></script>
    <script src="js/supabase.js?v=3"></script>
    <script src="js/db.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/main.js?v=3"></script>
    <script src="js/exam.js?v=3"></script>
</body>
</html>
