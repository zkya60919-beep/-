<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO Primary Tags ===== -->
    <title>تفاصيل الكورس | منصة الباسط للعلوم الشرعية</title>
    <meta name="description" content="تفاصيل الكورس على منصة الباسط للعلوم الشرعية">
    <meta name="keywords" content="كورسات الباسط, تفاصيل الكورس, منصة الباسط, علوم شرعية">
    <meta name="author" content="أ/ محمد عبد الباسط">
    <meta name="robots" content="index, follow">

    <!-- ===== Performance: Preconnect ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://supabase.co">
    <link rel="preconnect" href="https://supabase.co">

    <!-- ===== Styles ===== -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap">
</head>
<body>
    <!-- Load Supabase library first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Header with Logo -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="images/logo.jpg" alt="الباسط" class="logo-img">
                </div>
                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                        <li><a href="about.html" class="nav-link">نبذة عنا</a></li>
                        <li class="nav-divider"></li>
                        <li><a href="login.html" class="btn btn-outline btn-mobile">تسجيل الدخول</a></li>
                        <li><button class="btn btn-outline btn-mobile" onclick="window.location.href='index.html'">العودة</button></li>
                    </ul>
                </nav>
                <div class="auth-buttons" id="authButtons">
                    <a href="login.html" class="btn btn-outline">تسجيل الدخول</a>
                </div>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="القائمة">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <div class="nav-overlay" onclick="toggleMobileMenu()"></div>
    </header>

    <!-- Course Details Section -->
    <section class="course-details-section" style="padding: 60px 0;">
        <div class="container">
            <!-- Back Button -->
            <button class="btn btn-outline" onclick="window.location.href='index.html'" style="margin-bottom: 24px;">
                ← العودة للرئيسية
            </button>

            <div class="course-details-container" id="courseDetailsContainer">
                <!-- Loading State -->
                <div class="text-center" style="padding: 60px;">
                    <p>جاري تحميل تفاصيل الكورس...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/video-utils.js"></script>
    <script>
        // Load course details on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadCourseDetails();
        });

        async function loadCourseDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if (!courseId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const { data: course, error } = await supabase
                    .from('courses')
                    .select('*, grades(name), course_videos(*)')
                    .eq('id', courseId)
                    .eq('status', 'published')
                    .single();

                if (error || !course) {
                    throw error || new Error('Course not found');
                }

                const container = document.getElementById('courseDetailsContainer');
                const thumbnail = course.thumbnail || 'images/logo.jpg';
                const gradeName = course.grades?.name || '-';
                const priceClass = course.price === 0 ? 'free' : '';
                const priceText = course.price === 0 ? 'مجاني' : formatCurrency(course.price);
                const videos = course.course_videos || [];

                container.innerHTML = `
                    <div class="course-details-grid">
                        <!-- Course Info -->
                        <div class="course-info-card">
                            <div class="course-hero">
                                <img src="${thumbnail}" alt="${course.title}" class="course-hero-image">
                            </div>
                            <div class="course-info-content">
                                <h1 class="course-title">${course.title}</h1>
                                <p class="course-description">${course.description || 'لا يوجد وصف'}</p>
                                
                                <div class="course-meta">
                                    <span class="course-meta-item">📚 ${gradeName}</span>
                                    <span class="course-meta-item">🎬 ${videos.length} فيديو</span>
                                    <span class="course-meta-item">📅 ${formatDate(course.created_at)}</span>
                                </div>

                                <div class="course-price-section">
                                    <div class="course-price ${priceClass}" style="font-size: 32px;">${priceText}</div>
                                    <button class="btn btn-primary btn-large" id="purchaseBtn" onclick="purchaseCourse(${course.id})">
                                        شراء الآن
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Course Videos -->
                        <div class="course-videos-card">
                            <h2 class="section-title">محتوى الكورس</h2>
                            <div class="course-videos-list">
                                ${videos.length > 0 ? videos.map((video, index) => `
                                    <div class="course-video-item">
                                        <div class="video-number">${index + 1}</div>
                                        <div class="video-info">
                                            <h3 class="video-title">${video.title}</h3>
                                            <span class="video-duration">${formatDuration(video.duration)}</span>
                                        </div>
                                        <div class="video-lock-icon">🔒</div>
                                    </div>
                                `).join('') : '<p class="text-center" style="padding: 20px; color: var(--gray-500);">لا توجد فيديوهات في هذا الكورس</p>'}
                            </div>
                        </div>
                    </div>
                `;

                // Check if user already purchased
                await checkCoursePurchase(courseId);

            } catch (error) {
                console.error('Error loading course details:', error);
                const container = document.getElementById('courseDetailsContainer');
                container.innerHTML = `
                    <div class="text-center" style="padding: 60px;">
                        <p style="color: var(--gray-500);">تعذر تحميل تفاصيل الكورس</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'" style="margin-top: 16px;">
                            العودة للرئيسية
                        </button>
                    </div>
                `;
            }
        }

        async function checkCoursePurchase(courseId) {
            const user = await getCurrentUser();
            if (!user) return;

            try {
                const { data: purchase } = await supabase
                    .from('course_purchases')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('course_id', courseId)
                    .eq('status', 'active')
                    .maybeSingle();

                if (purchase) {
                    // User already purchased
                    const purchaseBtn = document.getElementById('purchaseBtn');
                    if (purchaseBtn) {
                        purchaseBtn.textContent = 'تم الشراء - مشاهدة الكورس';
                        purchaseBtn.onclick = () => watchCourse(courseId);
                        purchaseBtn.classList.remove('btn-primary');
                        purchaseBtn.classList.add('btn-success');
                    }

                    // Unlock videos
                    document.querySelectorAll('.video-lock-icon').forEach(icon => {
                        icon.textContent = '▶️';
                        icon.style.color = '#10b981';
                    });
                }
            } catch (error) {
                // No purchase found, that's fine
            }
        }

        async function purchaseCourse(courseId) {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html?redirect=course-details.html?id=' + courseId;
                return;
            }

            try {
                const { data: course, error } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('id', courseId)
                    .single();

                if (error) throw error;

                if (course.price === 0) {
                    await activateCourse(user.id, courseId);
                    return;
                }

                // Create a pending payment record
                const { data: payment, error: payErr } = await supabase
                    .from('payments')
                    .insert({
                        user_id: user.id,
                        student_id: user.id,
                        amount: course.price,
                        months: 1,
                        status: 'pending',
                        course_id: parseInt(courseId),
                        metadata: { payment_type: 'course', course_id: parseInt(courseId) }
                    })
                    .select()
                    .single();

                if (payErr) throw payErr;

                window.location.href = `payment.html?payment_id=${payment.id}&course_id=${courseId}`;

            } catch (error) {
                console.error('Error initiating purchase:', error);
                alert('حدث خطأ أثناء بدء عملية الشراء');
            }
        }

        async function activateCourse(userId, courseId) {
            try {
                const { error } = await supabase
                    .from('course_purchases')
                    .insert({
                        user_id: userId,
                        course_id: courseId,
                        status: 'active'
                    });

                if (error) throw error;

                alert('تم تفعيل الكورس بنجاح!');
                location.reload();

            } catch (error) {
                console.error('Error activating course:', error);
                alert('حدث خطأ أثناء تفعيل الكورس');
            }
        }

        function watchCourse(courseId) {
            // Redirect to course player page
            window.location.href = `course-player.html?id=${courseId}`;
        }

        // Expose functions globally
        window.purchaseCourse = purchaseCourse;
        window.watchCourse = watchCourse;
    </script>
</body>
</html>
