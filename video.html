<!DOCTYPE html>

<body>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" class="logo-text">الباسط</a>

                <nav class="nav">

                        <li><a href="dashboard.html" class="nav-link">لوحتي</a></li>
                    </ul>
                </nav>
                <div class="auth-buttons" id="authButtons"></div>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">

            </div>
        </div>
        <div class="nav-overlay" onclick="toggleMobileMenu()"></div>

    <main>

                </div>

                        <div class="spinner"></div>
                    </div>
                    <div class="video-info">
                        <h1 class="video-title" id="videoTitle">جاري التحميل...</h1>
                        <div class="video-meta">
                            <span id="videoGrade">-</span>
                            <span id="videoMonth">-</span>
                        </div>
                        <p class="video-description" id="videoDescription"></p>
                    </div>
                </div>
                <div class="related-videos">
                    <h2 class="section-title">فيديوهات ذات صلة</h2>
                    <div class="videos-grid" id="relatedVideosGrid">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-text">الباسط</div>

                <div class="footer-links">
