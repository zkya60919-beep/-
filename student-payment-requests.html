<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الدفع | الباسط</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo"><a href="index.html" class="logo-text">الباسط</a></div>
                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="dashboard.html" class="nav-link">لوحتي</a></li>
                        <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                    </ul>
                </nav>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
            </div>
        </div>
        <div class="nav-overlay" onclick="toggleMobileMenu()"></div>
    </header>

    <main style="padding:40px 0">
        <div class="container">
            <div class="page-back-bar">
                <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← العودة للوحة التحكم</button>
            </div>
            <h2 class="section-title">طلبات الدفع الخاصة بي</h2>

            <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap" id="statusTabs">
                <button class="btn btn-sm active" data-filter="all" onclick="filterRequests('all', this)">الكل</button>
                <button class="btn btn-sm" data-filter="pending" onclick="filterRequests('pending', this)" style="background:#fef3c7;color:#92400e">قيد الانتظار</button>
                <button class="btn btn-sm" data-filter="approved" onclick="filterRequests('approved', this)" style="background:#d1fae5;color:#065f46">مقبول</button>
                <button class="btn btn-sm" data-filter="rejected" onclick="filterRequests('rejected', this)" style="background:#fee2e2;color:#991b1b">مرفوض</button>
            </div>

            <div id="requestsList" style="display:grid;gap:16px">
                <p class="text-center" style="color:var(--gray-500);padding:40px">جاري التحميل...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><div class="logo-text">الباسط</div><p>منصة تعليمية احترافية للطلاب</p></div>
                <div class="footer-links"><h3>روابط سريعة</h3><ul><li><a href="index.html">الرئيسية</a></li><li><a href="about.html">نبذة عنا</a></li></ul></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2026 منصة الباسط. جميع الحقوق محفوظة.</p></div>
        </div>
    </footer>

    <script src="js/config.js?v=3"></script>
    <script src="js/supabase.js?v=3"></script>
    <script src="js/db.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/main.js?v=3"></script>
    <script src="js/student-payment-requests.js?v=3"></script>
</body>
</html>
