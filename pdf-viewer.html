<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الملف - الباسط</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #1e293b; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
        .toolbar h1 { font-size: 18px; font-weight: 700; }
        .toolbar .back-btn { background: #334155; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .toolbar .back-btn:hover { background: #475569; }
        .viewer-container { flex: 1; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .viewer-container embed, .viewer-container iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff; }
        .error-state { text-align: center; padding: 40px; color: #64748b; }
        .error-state h2 { font-size: 24px; margin-bottom: 12px; color: #ef4444; }
        .error-state p { font-size: 16px; }
        @media (max-width: 768px) { .viewer-container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="back-btn" onclick="goBack()">← العودة</button>
        <h1>عرض الملف</h1>
    </div>
    <div class="viewer-container" id="viewerContainer">
        <div class="error-state" id="errorState">
            <h2>تعذر تحميل الملف</h2>
            <p>يرجى المحاولة مرة أخرى أو التواصل مع الدعم الفني</p>
        </div>
    </div>
    <script>
        function goBack() {
            if (document.referrer) { window.location.href = document.referrer; }
            else { window.history.back(); }
        }
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        const pdfUrl = getQueryParam('url');
        if (pdfUrl) {
            const container = document.getElementById('viewerContainer');
            const decodedUrl = decodeURIComponent(pdfUrl);
            const embed = document.createElement('embed');
            embed.src = decodedUrl;
            embed.type = 'application/pdf';
            embed.setAttribute('width', '100%');
            embed.setAttribute('height', '100%');
            embed.onerror = function() {
                document.getElementById('errorState').style.display = 'block';
                embed.style.display = 'none';
            };
            embed.onload = function() {
                document.getElementById('errorState').style.display = 'none';
            };
            container.innerHTML = '';
            container.appendChild(embed);
        }
    </script>
</body>
</html>
